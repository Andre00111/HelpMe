# Server Configuration
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/helpme_db
spring.datasource.username=helpme_user
spring.datasource.password=helpme_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.helpme=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-at-least-32-characters-long!!
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
