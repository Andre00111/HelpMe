# Server Configuration
server.port=8081
server.servlet.context-path=/api

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/helpme_db
spring.datasource.username=${DB_USER:helpme_user}
spring.datasource.password=${DB_PASSWORD:helpme_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.helpme=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-at-least-32-characters-long!!}
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
